name: 📦 Publish to PyPI

# 触发：
# - 推 tag v*.*.* 自动发布到 PyPI
# - 手动 workflow_dispatch 可发布到 TestPyPI 试水
#
# 安全机制：OIDC Trusted Publishing（无需 API token）
# 配置方法见 README.md "Releasing to PyPI" 章节

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      target:
        description: "目标 index"
        required: true
        default: "testpypi"
        type: choice
        options:
          - testpypi
          - pypi

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade build twine

      - name: Verify version matches tag (for tag pushes)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(python -c "import tomllib; print(tomllib.loads(open('pyproject.toml','rb').read().decode())['project']['version'])")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag v$TAG_VERSION does not match pyproject version $PKG_VERSION"
            exit 1
          fi
          echo "✓ Tag v$TAG_VERSION matches pyproject version $PKG_VERSION"

      - name: Build sdist + wheel
        run: python -m build

      - name: Check distribution
        run: python -m twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: distributions
          path: dist/

  publish-testpypi:
    needs: build
    # 只在 workflow_dispatch + target=testpypi 时发 TestPyPI
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'testpypi'
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/nth-team-layer
    permissions:
      id-token: write  # OIDC token for trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: distributions
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    needs: build
    # 标准发布：tag push 或者 workflow_dispatch + target=pypi
    if: |
      startsWith(github.ref, 'refs/tags/') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'pypi')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/nth-team-layer
    permissions:
      id-token: write  # OIDC token for trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # 默认上传到 pypi.org — 无需额外参数
